<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Protocolo de Treino - Acesso Restrito</title>
    <!-- Bibliotecas Necessárias -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Ícones Lucide -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .chart-container {
            position: relative;
            width: 100%;
            height: 300px;
        }
    </style>
</head>
<body class="bg-stone-50 text-stone-800 antialiased">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const App = () => {
            const [isAuthenticated, setIsAuthenticated] = useState(false);
            const [password, setPassword] = useState('');
            const [activeTab, setActiveTab] = useState('overview');
            const [error, setError] = useState('');
            const chartRef = useRef(null);
            const chartInstance = useRef(null);

            // DEFINA SUA SENHA AQUI
            const CORRECT_PASSWORD = "treino_secreto";

            useEffect(() => {
                lucide.createIcons();
            }, [isAuthenticated, activeTab]);

            useEffect(() => {
                if (isAuthenticated && activeTab === 'overview' && chartRef.current) {
                    if (chartInstance.current) {
                        chartInstance.current.destroy();
                    }
                    const ctx = chartRef.current.getContext('2d');
                    chartInstance.current = new Chart(ctx, {
                        type: 'bar',
                        data: {
                            labels: ['Etapa 1', 'Etapa 2', 'Etapa 3'],
                            datasets: [{
                                label: 'Volume de Exercícios',
                                data: [9, 10, 12],
                                backgroundColor: '#d97706',
                                borderRadius: 8
                            }]
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                            plugins: { legend: { display: false } },
                            scales: {
                                y: { beginAtZero: true, grid: { display: false } },
                                x: { grid: { display: false } }
                            }
                        }
                    });
                }
            }, [isAuthenticated, activeTab]);

            const handleLogin = (e) => {
                e.preventDefault();
                if (password === CORRECT_PASSWORD) {
                    setIsAuthenticated(true);
                    setError('');
                } else {
                    setError('Senha incorreta. Tente novamente.');
                }
            };

            if (!isAuthenticated) {
                return (
                    <div className="min-h-screen flex items-center justify-center px-4">
                        <div className="max-w-md w-full bg-white p-8 rounded-2xl shadow-xl border border-stone-200">
                            <div className="flex justify-center mb-6">
                                <div className="p-4 bg-amber-100 rounded-full">
                                    <i data-lucide="lock" class="w-8 h-8 text-amber-600"></i>
                                </div>
                            </div>
                            <h2 className="text-2xl font-bold text-center text-stone-900 mb-2">Acesso Restrito</h2>
                            <p className="text-stone-600 text-center mb-8">Insira a senha do protocolo para visualizar sua rotina de treinos.</p>
                            
                            <form onSubmit={handleLogin} className="space-y-4">
                                <input
                                    type="password"
                                    value={password}
                                    onChange={(e) => setPassword(e.target.value)}
                                    placeholder="Sua senha"
                                    className="w-full px-4 py-3 rounded-xl border border-stone-200 focus:ring-2 focus:ring-amber-500 outline-none transition-all"
                                />
                                {error && <p className="text-red-500 text-sm text-center">{error}</p>}
                                <button
                                    type="submit"
                                    className="w-full bg-amber-600 hover:bg-amber-700 text-white font-semibold py-3 rounded-xl transition-colors shadow-md"
                                >
                                    Entrar no Sistema
                                </button>
                            </form>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen p-4 md:p-8">
                    <header className="max-w-6xl mx-auto mb-10">
                        <div className="flex items-center space-x-3 mb-2">
                            <i data-lucide="activity" class="text-amber-600"></i>
                            <span className="text-sm font-bold tracking-widest text-stone-500 uppercase">Protocolo Ativo</span>
                        </div>
                        <h1 className="text-4xl font-extrabold text-stone-900 tracking-tight">Dashboard de Performance</h1>
                    </header>

                    <nav className="max-w-6xl mx-auto flex space-x-1 bg-stone-200/50 p-1 rounded-xl mb-8">
                        <button onClick={() => setActiveTab('overview')} className={`flex-1 flex items-center justify-center space-x-2 py-3 rounded-lg text-sm font-semibold transition-all ${activeTab === 'overview' ? 'bg-white text-amber-700 shadow-sm' : 'text-stone-500'}`}>
                            <i data-lucide="layout-dashboard" class="w-4 h-4"></i>
                            <span>Visão Geral</span>
                        </button>
                        <button onClick={() => setActiveTab('mobility')} className={`flex-1 flex items-center justify-center space-x-2 py-3 rounded-lg text-sm font-semibold transition-all ${activeTab === 'mobility' ? 'bg-white text-amber-700 shadow-sm' : 'text-stone-500'}`}>
                            <i data-lucide="activity" class="w-4 h-4"></i>
                            <span>Mobilidade</span>
                        </button>
                        <button onClick={() => setActiveTab('strength')} className={`flex-1 flex items-center justify-center space-x-2 py-3 rounded-lg text-sm font-semibold transition-all ${activeTab === 'strength' ? 'bg-white text-amber-700 shadow-sm' : 'text-stone-500'}`}>
                            <i data-lucide="dumbbell" class="w-4 h-4"></i>
                            <span>Força</span>
                        </button>
                    </nav>

                    <main className="max-w-6xl mx-auto">
                        {activeTab === 'overview' && (
                            <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                                <div className="lg:col-span-2 bg-white p-6 rounded-2xl border border-stone-200 shadow-sm">
                                    <h3 className="text-lg font-bold mb-6 flex items-center">
                                        <i data-lucide="check-circle-2" class="w-5 h-5 mr-2 text-green-500"></i>
                                        Intensidade por Etapa
                                    </h3>
                                    <div className="chart-container">
                                        <canvas ref={chartRef}></canvas>
                                    </div>
                                </div>
                                
                                <div className="bg-amber-600 text-white p-8 rounded-2xl shadow-lg flex flex-col justify-between">
                                    <div>
                                        <h3 className="text-2xl font-bold mb-4">Sessão Sugerida</h3>
                                        <p className="text-amber-100 mb-6 italic">"A consistência supera a intensidade no longo prazo."</p>
                                        <ul className="space-y-4">
                                            <li className="flex items-start space-x-3">
                                                <i data-lucide="arrow-right" class="w-4 h-4 mt-1"></i>
                                                <span>Mobilidade Etapa 2 (Treino A)</span>
                                            </li>
                                            <li className="flex items-start space-x-3">
                                                <i data-lucide="arrow-right" class="w-4 h-4 mt-1"></i>
                                                <span>Força SASS (Braço Esticado)</span>
                                            </li>
                                        </ul>
                                    </div>
                                    <button className="mt-8 bg-white text-amber-700 font-bold py-3 px-6 rounded-xl text-center hover:bg-stone-50 transition-colors">
                                        Iniciar Treino Hoje
                                    </button>
                                </div>
                            </div>
                        )}

                        {activeTab !== 'overview' && (
                            <div className="bg-white p-8 rounded-2xl border border-stone-200 text-center">
                                <h3 className="text-xl font-bold mb-4 text-stone-900">Módulo de {activeTab === 'mobility' ? 'Mobilidade' : 'Força'}</h3>
                                <p className="text-stone-600">Acesse as rotinas específicas para o seu nível de condicionamento.</p>
                            </div>
                        )}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
