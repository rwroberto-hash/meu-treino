    <!-- Bibliotecas Necessárias -->

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Ícones Lucide -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .chart-container {
            position: relative;
            width: 100%;
            height: 300px;
        }
        .filter-active {
            background-color: #d97706;
            color: white;
            border-color: #d97706;
        }
    </style>
</head>
<body class="bg-stone-50 text-stone-800 antialiased">
    <!-- Chosen Palette: Warm Neutrals (Stone/Amber) -->
    <!-- Application Structure Plan: Dashboard interativo com autenticação frontal. A navegação é dividida em três pilares: Visão Geral (analítica), Mobilidade (operacional com filtros por etapa) e Força (especializada por tipo de braço). A base de dados foi expandida para incluir 100% dos exercícios dos PDFs originais. -->
    <!-- Visualization & Content Choices: Gráficos de barras para volume de treino, cards interativos para exercícios e sistema de abas para troca de contexto. Confirmado o uso de Chart.js e Tailwind para construção visual. -->
    <!-- CONFIRMATION: NO SVG graphics used. NO Mermaid JS used. -->

    <div id="root"></div>

            // Estados de filtro

            // Base de Dados Completa de Mobilidade

                { e: 1, t: 'A', ex: 'Coluna - Tilt Lateral', p: '10 reps + 10 seg cada lado' },
                { e: 1, t: 'A', ex: 'Coluna - Torção', p: '10 reps + 10 seg cada lado' },

                { e: 1, t: 'A', ex: 'Drop Stance', p: '8 a 10 reps cada lado' },
                { e: 1, t: 'A', ex: 'Isometria Cossack', p: '30 a 45 seg' },

                { e: 1, t: 'B1', ex: 'Coluna - Tilt Lateral', p: '10 reps + 10 seg cada lado' },
                { e: 1, t: 'B1', ex: 'Coluna - Torção', p: '10 reps + 10 seg cada lado' },
                { e: 1, t: 'B1', ex: 'Cócoras Bounce', p: '30 a 60 seg' },
                { e: 1, t: 'B1', ex: 'Cócoras Buda Prayer', p: '10 a 15 reps + 10 a 15 seg' },

                { e: 3, t: 'A', ex: 'Coluna Figura 8', p: '10 cada sentido' },
                { e: 3, t: 'A', ex: 'Coluna Livre', p: '2 a 4 minutos' },
                { e: 3, t: 'A', ex: 'Panqueca Pé', p: '10 a 15 reps + 10 a 15 seg' },
                { e: 3, t: 'A', ex: 'Horse Stance Circular', p: '10 reps cada sentido' },
                { e: 3, t: 'A', ex: 'Drop Stance + Búlgaro', p: '5 reps + 10 seg cada posição' },
                { e: 3, t: 'A', ex: 'Cossack + Diagonal', p: '10 reps + 10 seg cada lado' },
                { e: 3, t: 'A', ex: 'Drop Stance + Cossack + Búlgaro + Diagonal (Um Lado)', p: '5 reps cada lado' },
                { e: 3, t: 'A', ex: 'Drop Stance + Cossack + Búlgaro + Diagonal (Completo)', p: '5 reps cada lado' },
                { e: 3, t: 'A', ex: 'Exploração Livre', p: '60 a 90 seg' },

                // ETAPA 3 - TREINO B1
                { e: 3, t: 'B1', ex: 'Círculos de Coluna', p: '10 cada lado' },
                { e: 3, t: 'B1', ex: 'Coluna Figura 8', p: '10 cada lado' },
                { e: 3, t: 'B1', ex: 'Coluna Livre', p: '2 a 4 minutos' },
                { e: 3, t: 'B1', ex: 'Cócoras Bounce', p: '30 a 60 seg' },
                { e: 3, t: 'B1', ex: 'Cócoras Pike', p: '10 a 15 reps + 10 a 15 seg' },
                { e: 3, t: 'B1', ex: 'Cócoras + 90/90 + Panqueca Meia Lua', p: '10 reps totais' },
                { e: 3, t: 'B1', ex: 'Cócoras + Panqueca + 90/90 + Pescador + Cócoras', p: '10 reps totais' },
                { e: 3, t: 'B1', ex: 'Exploração Livre', p: '60 a 90 seg' },

                // ETAPA 3 - TREINO B2
                { e: 3, t: 'B2', ex: 'Círculos de Coluna', p: '10 cada lado' },
                { e: 3, t: 'B2', ex: 'Coluna Figura 8', p: '10 cada lado' },
                { e: 3, t: 'B2', ex: 'Coluna Livre', p: '2 a 4 minutos' },
                { e: 3, t: 'B2', ex: 'Cócoras Bounce', p: '30 a 60 seg' },

            ];

            // Base de Dados de Força
            const strengthData = [
                // SASS
                { c: 'SASS', b: 'Pendurada', ex: '1. Pendurada Passiva', p: 'Meta: 90s + Retr./Protr. (6 apoios)' },
                { c: 'SASS', b: 'Pendurada', ex: '2. Pendurada Ativa', p: 'Meta: 60s + Retr./Protr. (4 apoios)' },
                { c: 'SASS', b: 'Pendurada', ex: '3. Pendurada Passiva-Ativa', p: 'Meta: 60s + Retr./Protr. (Prancha Alta)' },
                { c: 'SASS', b: 'Força', ex: '1. Prancha de Protração', p: '15 a 30s' },
                { c: 'SASS', b: 'Força', ex: '2. Pendurada Arqueada', p: '5 a 8 reps (segurar 2-5s)' },
                { c: 'SASS', b: 'Preventivo', ex: '1. Rotação Cubana', p: '2 a 3 séries de 8 a 12 reps (Cadência 4020)' },

                { c: 'BASS', b: 'Força', ex: '1. Flexão', p: '3 a 8 reps (Cadência 31X1)' },
                { c: 'BASS', b: 'Força', ex: '2. Barra Normal', p: '3 a 6 reps (Cadência 41X1)' },
                { c: 'BASS', b: 'Força', ex: '* Barra Excêntrica', p: 'AMRAP 10-15min (10s de descida lenta)' },
                { c: 'BASS', b: 'Finalizador', ex: '1. Isometria Baixa na Flexão', p: '30 a 60 segundos (empurrada)' },
                { c: 'BASS', b: 'Finalizador', ex: '2. Isometria Alta na Barra', p: '10 segundos (empurrada)' }
            ];

            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, [isAuthenticated, activeTab, mobilityEtapa, mobilityTreino, strengthType]);

            useEffect(() => {
                if (isAuthenticated && activeTab === 'overview' && chartRef.current) {
                    if (chartInstance.current) {
                        chartInstance.current.destroy();
                    }
                    const ctx = chartRef.current.getContext('2d');
                    chartInstance.current = new Chart(ctx, {
                        type: 'bar',
                        data: {
                            labels: ['Etapa 1', 'Etapa 2', 'Etapa 3'],
                            datasets: [{
                                label: 'Exercícios (Treino A)',
                                data: [9, 7, 10],
                                backgroundColor: '#d97706',
                                borderRadius: 8
                            }]
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                            plugins: { legend: { display: false } },
                            scales: {
                                y: { beginAtZero: true, grid: { display: false }, ticks: { color: '#78716c' } },
                                x: { grid: { display: false }, ticks: { color: '#78716c' } }
                            }
                        }
                    });
                }
            }, [isAuthenticated, activeTab]);

            const handleLogin = (e) => {
                e.preventDefault();
                if (password === CORRECT_PASSWORD) {
                    setIsAuthenticated(true);
                    setError('');
                } else {
                    setError('Senha incorreta. Tente novamente.');
                }
            };

            if (!isAuthenticated) {
                return (
                    <div className="min-h-screen flex items-center justify-center px-4 bg-stone-100">
                        <div className="max-w-md w-full bg-white p-10 rounded-3xl shadow-2xl border border-stone-200">
                            <div className="flex justify-center mb-8">
                                <div className="p-5 bg-amber-100 rounded-full">

                                            </div>

                                            </div>
                                        </div>

                                        <button onClick={() => setActiveTab('mobility')} className="w-full flex items-center justify-between p-4 bg-stone-800 rounded-2xl hover:bg-stone-700 transition-colors mb-3">

                                            <i data-lucide="arrow-right" class="w-4 h-4"></i>

                                    </div>

                                                    <div className="bg-stone-50 p-4 rounded-2xl text-sm text-stone-600 border border-stone-100 flex items-center shadow-inner">
                                                        <i data-lucide="clock-3" class="w-5 h-5 mr-3 text-amber-600"></i>
                                                        <span className="font-semibold">{item.p}</span>
                                                    </div>
                                                </div>
                                            </div>
                                        ))
                                    ) : (
                                        <div className="col-span-full py-32 text-center bg-white rounded-3xl border border-dashed border-stone-300">
                                            <i data-lucide="search-x" class="w-16 h-16 mx-auto mb-6 text-stone-200"></i>
                                            <p className="text-stone-400 font-bold">Nenhum treino encontrado nesta combinação.</p>
                                        </div>
                                    )}
                                </div>
                            </div>
                        )}

                        {activeTab === 'strength' && (
                            <div className="animate-in zoom-in-95 duration-500">
                                <div className="flex flex-col gap-2 mb-10">
                                    <span className="text-[10px] font-black text-stone-400 uppercase tracking-widest">Protocolo de Força</span>
                                    <div className="flex bg-stone-200/50 p-1.5 rounded-2xl w-fit border border-stone-200 shadow-inner">
                                        {['SASS', 'BASS'].map(type => (
                                            <button key={type} onClick={() => setStrengthType(type)} className={`px-8 py-4 rounded-xl text-xs font-black transition-all ${strengthType === type ? 'bg-amber-600 text-white shadow-xl' : 'text-stone-500'}`}>
                                                {type === 'SASS' ? 'BRAÇO ESTICADO' : 'BRAÇO DOBRADO'}
                                            </button>
                                        ))}
                                    </div>
                                </div>

                                <div className="space-y-12">
                                    {['Pendurada', 'Força', 'Preventivo', 'Finalizador'].map(bloco => {
                                        const exercises = strengthData.filter(d => d.c === strengthType && d.b === bloco);
                                        if (exercises.length === 0) return null;
                                        return (
                                            <div key={bloco} className="relative">
                                                <div className="flex items-center mb-8">
                                                    <h3 className="text-2xl font-black text-stone-900 uppercase tracking-tighter mr-6">Bloco: {bloco}</h3>
                                                    <div className="h-px flex-1 bg-stone-200"></div>
                                                </div>
                                                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                                    {exercises.map((ex, idx) => (
                                                        <div key={idx} className="bg-white p-8 rounded-3xl border border-stone-200 shadow-sm flex flex-col md:flex-row md:items-center gap-6">
                                                            <div className="flex-1">
                                                                <h4 className="text-lg font-black text-stone-800 mb-2">{ex.ex}</h4>
                                                                <p className="text-stone-500 font-medium leading-relaxed">{ex.p}</p>
                                                            </div>
                                                            <div className="p-4 bg-stone-50 rounded-2xl border border-stone-100 flex items-center justify-center">
                                                                <i data-lucide="play-circle" class="w-8 h-8 text-amber-600 opacity-20 group-hover:opacity-100 transition-opacity"></i>
                                                            </div>
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        )}
                    </main>
                    
                    <footer className="max-w-6xl mx-auto mt-20 pt-10 border-t border-stone-200 pb-10 text-center">
                        <div className="flex justify-center space-x-6 mb-6 grayscale opacity-30">
                            <i data-lucide="shield-check" class="w-6 h-6"></i>
                            <i data-lucide="target" class="w-6 h-6"></i>
                            <i data-lucide="flame" class="w-6 h-6"></i>
                        </div>
                        <p className="text-xs font-black text-stone-400 uppercase tracking-[0.3em]">&copy; 2026 Protocolo Adapta Dinâmica</p>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
