        import { getFirestore, doc, setDoc, getDoc, onSnapshot, collection } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        window.FirebaseSDK = { initializeApp, getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged, getFirestore, doc, setDoc, getDoc, onSnapshot, collection };

                const firestore = getFirestore(app);
                setDb(firestore);

                const initAuth = async () => {
                    if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                        await signInWithCustomToken(auth, __initial_auth_token);
                    } else {
                        await signInAnonymously(auth);
                    }
                };
                initAuth();

                const unsubscribe = onAuthStateChanged(auth, (u) => {
                    if (u) setUser(u);
                });
                return () => unsubscribe();

                    } else {

                setIsSyncing(true);
                const { doc, setDoc } = window.FirebaseSDK;
                const newLogs = { ...completedLogs, [exId]: !completedLogs[exId] };
                
                try {
                    const docRef = doc(db, 'artifacts', appId, 'users', user.uid, 'history', selectedDate);
                    await setDoc(docRef, { exercises: newLogs, updatedAt: new Date().toISOString() }, { merge: true });

                    console.error("Erro ao salvar:", err);
                } finally {
                    setIsSyncing(false);
                }

                            <button 
                                key={t.id} 
                                onClick={() => setActiveTab(t.id)}
                                className={`flex-1 py-3 rounded-2xl text-xs font-black flex flex-col items-center gap-1 transition-all ${activeTab === t.id ? 'bg-amber-600 text-white shadow-lg' : 'bg-white text-stone-400 border border-stone-200'}`}
                            >
                                <i data-lucide={t.icon} className="w-4 h-4"></i>
                                <span>{t.label}</span>
                            </button>
                        ))}
                    </nav>

                    <main className="max-w-6xl mx-auto p-4 mt-4">
                        {activeTab === 'overview' && (
                            <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                                <div className="lg:col-span-2 bg-white p-6 rounded-3xl border border-stone-200 shadow-sm">
                                    <h3 className="text-sm font-black uppercase text-stone-400 mb-6 flex items-center">
                                        <i data-lucide="trending-up" className="w-4 h-4 mr-2"></i>
                                        Semanário de Execução
                                    </h3>
                                    <div className="chart-container"><canvas ref={chartRef}></canvas></div>
                                </div>
                                <div className="bg-stone-900 text-white p-8 rounded-3xl shadow-xl flex flex-col justify-between">
                                    <div>
                                        <div className="text-amber-500 text-xs font-black uppercase tracking-widest mb-2">Resumo de Hoje</div>
                                        <div className="text-5xl font-black mb-2">{Object.keys(completedLogs).filter(k => completedLogs[k]).length}</div>
                                        <div className="text-stone-400 text-sm font-medium">Exercícios concluídos com sucesso.</div>
                                    </div>
                                    <div className="mt-8 pt-6 border-t border-white/10">
                                        <p className="text-stone-400 text-xs italic">"Cada marcação é um compromisso renovado com a sua base estrutural."</p>
                                    </div>
                                </div>
                            </div>
                        )}

                        {activeTab === 'mobility' && (
                            <div className="space-y-6">
                                <div className="flex flex-wrap gap-4">
                                    <div className="flex bg-stone-200 p-1 rounded-xl">
                                        {[1, 2, 3].map(e => (
                                            <button key={e} onClick={() => setMobilityEtapa(e)} className={`px-4 py-2 rounded-lg text-[10px] font-black transition-all ${mobilityEtapa === e ? 'bg-white text-amber-700 shadow' : 'text-stone-500'}`}>ETAPA {e}</button>
                                        ))}
                                    </div>
                                    <div className="flex bg-stone-200 p-1 rounded-xl">
                                        {['A', 'B1', 'B2'].map(t => (
                                            <button key={t} onClick={() => setMobilityTreino(t)} className={`px-4 py-2 rounded-lg text-[10px] font-black transition-all ${mobilityTreino === t ? 'bg-white text-amber-700 shadow' : 'text-stone-500'}`}>TREINO {t}</button>
                                        ))}
                                    </div>
                                </div>

                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                                    {mobilityData.filter(d => d.e === mobilityEtapa && d.t === mobilityTreino).map((item) => (
                                        <div 
                                            key={item.id} 
                                            onClick={() => toggleExercise(item.id)}
                                            className={`relative group cursor-pointer bg-white p-6 rounded-3xl border-2 transition-all duration-300 ${completedLogs[item.id] ? 'border-amber-600 bg-amber-50/30' : 'border-stone-100'}`}
                                        >
                                            <div className="flex justify-between items-start mb-4">
                                                <div className="text-[10px] font-black uppercase text-amber-600">Dinâmico</div>
                                                <div className="relative">
                                                    <input type="checkbox" checked={!!completedLogs[item.id]} readOnly className="checkbox-custom absolute opacity-0 w-6 h-6" />
                                                    <div className="w-6 h-6 border-2 border-stone-200 rounded-lg flex items-center justify-center transition-all">
                                                        <i data-lucide="check" className="w-4 h-4 text-white hidden"></i>
                                                    </div>
                                                </div>
                                            </div>
                                            <h4 className="text-lg font-black text-stone-800 leading-tight mb-2">{item.ex}</h4>
                                            <p className="text-xs text-stone-500 font-medium">{item.p}</p>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {activeTab === 'strength' && (
                            <div className="space-y-10">
                                <div className="flex bg-stone-200 p-1 rounded-2xl w-fit">
                                    {['SASS', 'BASS'].map(t => (
                                        <button key={t} onClick={() => setStrengthType(t)} className={`px-8 py-3 rounded-xl text-xs font-black transition-all ${strengthType === t ? 'bg-white text-amber-700 shadow' : 'text-stone-500'}`}>{t}</button>
                                    ))}
                                </div>
                                
                                {['Pendurada', 'Força', 'Preventivo', 'Finalizador'].map(bloco => {
                                    const exercises = strengthData.filter(d => d.c === strengthType && d.b === bloco);
                                    if (exercises.length === 0) return null;
                                    return (
                                        <div key={bloco}>
                                            <h3 className="text-lg font-black uppercase tracking-tighter mb-6 flex items-center">
                                                <span className="w-8 h-px bg-stone-300 mr-4"></span>
                                                {bloco}
                                            </h3>
                                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                                {exercises.map(ex => (
                                                    <div 
                                                        key={ex.id}
                                                        onClick={() => toggleExercise(ex.id)}
                                                        className={`p-6 rounded-3xl border-2 flex items-center space-x-4 cursor-pointer transition-all ${completedLogs[ex.id] ? 'border-amber-600 bg-amber-50' : 'bg-white border-stone-100'}`}
                                                    >
                                                        <div className="w-8 h-8 rounded-full bg-stone-100 flex items-center justify-center">
                                                            {completedLogs[ex.id] ? <i data-lucide="check" className="w-4 h-4 text-amber-600"></i> : <i data-lucide="circle" className="w-4 h-4 text-stone-300"></i>}
                                                        </div>
                                                        <div className="flex-1">
                                                            <div className="text-sm font-black text-stone-800">{ex.ex}</div>
                                                            <div className="text-[10px] text-stone-400 uppercase font-bold">{ex.p}</div>
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        )}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
